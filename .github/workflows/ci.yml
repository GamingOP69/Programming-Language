name: Samrat CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Run all tests
      run: |
        cd tests
        python test_comprehensive.py
        python test_compiler.py
        python run_all.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install linters
      run: |
        python -m pip install flake8

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --max-complexity=15 --max-line-length=120 --statistics

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install bandit
      run: |
        python -m pip install bandit

    - name: Security scan
      run: |
        bandit -r src/ -f json -o security-report.json || true

  release:
    name: Release ${{ github.ref_name }}
    needs: [test, lint, security]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Build executables
      run: |
        python -m pip install pyinstaller
        cd src
        pyinstaller --onefile --name samrat main.py
        pyinstaller --onefile --name samrat-cli cli.py

    - name: Create source archives
      run: |
        tar -czf samrat-source.tar.gz --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' .
        zip -r samrat-source.zip . -x '.git/*' '__pycache__/*' '*.pyc'

    - name: Generate checksums
      run: |
        sha256sum src/dist/samrat src/dist/samrat-cli samrat-source.tar.gz samrat-source.zip > checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: Samrat ${{ github.ref_name }}
        body_path: docs/CHANGELOG.md
        draft: false
        prerelease: false
        files: |
          src/dist/samrat
          src/dist/samrat-cli
          samrat-source.tar.gz
          samrat-source.zip
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}