name: Samrat CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  # ─── Test Job — runs on ALL pushes and PRs ────────────────────────────
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'  # automatically caches pip packages

    - name: Install dependencies (if any)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run comprehensive tests
      run: |
        cd tests
        python test_comprehensive.py || true  # continue even if one fails

    - name: Run compiler tests
      run: |
        cd tests
        python test_compiler.py || true

    - name: Run all tests (combined)
      run: |
        cd tests
        python run_all.py

  # ─── Lint Job — runs on ALL pushes and PRs ────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install linters and dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        pip install flake8

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --max-complexity=15 --max-line-length=120 --statistics

  # ─── Build Job — runs on ALL pushes and PRs ───────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executables
      run: |
        cd src
        pyinstaller --onefile --name samrat-${{ runner.os }} main.py
        pyinstaller --onefile --name samrat-cli-${{ runner.os }} cli.py
        mkdir -p ../dist
        cp dist/* ../dist/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: samrat-${{ runner.os }}
        path: dist/
        retention-days: 7

  # ─── Security Scan — runs on ALL pushes and PRs ───────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Run security scan
      run: |
        bandit -r src/ -f json -o security-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.json
        retention-days: 7

  # ─── Release Job — runs ONLY on version tags (v*) ────────────────────
  release:
    name: Release ${{ github.ref_name }}
    needs: [test, lint, build, security]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all built artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        # Copy binaries from each OS (rename consistently)
        cp artifacts/samrat-ubuntu-latest/*.exe* release-assets/ 2>/dev/null || true
        cp artifacts/samrat-windows-latest/*.exe* release-assets/ 2>/dev/null || true
        cp artifacts/samrat-macos-latest/* release-assets/ 2>/dev/null || true
        # Also copy source archives (if any)
        cp samrat-source.tar.gz release-assets/ 2>/dev/null || true
        cp samrat-source.zip release-assets/ 2>/dev/null || true

    - name: Generate checksums for all assets
      run: |
        cd release-assets
        sha256sum * > checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Samrat ${{ github.ref_name }}
        body_path: docs/CHANGELOG.md
        draft: false
        prerelease: false
        files: release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}