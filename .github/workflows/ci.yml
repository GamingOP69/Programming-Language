name: Samrat CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  # ─── Test Job — runs on ALL pushes and PRs ────────────────────────────
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run comprehensive tests
      run: |
        cd tests
        python test_comprehensive.py

    - name: Run compiler tests
      run: |
        cd tests
        python test_compiler.py

    - name: Run all tests (combined)
      run: |
        cd tests
        python run_all.py

  # ─── Lint Job — runs on ALL pushes and PRs ────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --max-complexity=15 --max-line-length=120 --statistics

  # ─── Build Job — runs on ALL pushes and PRs ───────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executable
      run: |
        cd src
        pyinstaller --onefile --name samrat-${{ runner.os }} main.py
        pyinstaller --onefile --name samrat-cli-${{ runner.os }} cli.py

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: samrat-${{ runner.os }}
        path: |
          src/dist/samrat-*

  # ─── Security Scan — runs on ALL pushes and PRs ───────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Security scan
      run: |
        bandit -r src/ -f json -o security-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v7
      with:
        name: security-report
        path: security-report.json

  # ─── Release Job — runs ONLY on version tags (v*) ────────────────────
  release:
    name: Release ${{ github.ref_name }}
    needs: [test, lint, build, security]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Linux executables
      run: |
        cd src
        pyinstaller --onefile --name samrat-linux main.py
        pyinstaller --onefile --name samrat-cli-linux cli.py
        mkdir -p ../dist
        mv dist/samrat-linux ../dist/
        mv dist/samrat-cli-linux ../dist/

    - name: Upload artifacts to release
      uses: softprops/action-gh-release@v3
      with:
        name: Samrat ${{ github.ref_name }}
        body_path: docs/CHANGELOG.md
        draft: false
        prerelease: false
        files: |
          dist/samrat-linux
          dist/samrat-cli-linux
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
