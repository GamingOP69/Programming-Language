name: Samrat CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run comprehensive tests
      run: |
        cd tests
        python test_comprehensive.py

    - name: Run compiler tests
      run: |
        cd tests
        python test_compiler.py

    - name: Run all tests (combined)
      run: |
        cd tests
        python run_all.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install linters
      run: |
        python -m pip install flake8

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --max-complexity=15 --max-line-length=120 --statistics

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install PyInstaller
      run: |
        python -m pip install pyinstaller

    - name: Build executable
      run: |
        cd src
        pyinstaller --onefile --name samrat-${{ runner.os }} main.py
        pyinstaller --onefile --name samrat-cli-${{ runner.os }} cli.py

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: samrat-${{ runner.os }}
        path: |
          src/dist/samrat-*
        if-no-files-found: warn

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install bandit
      run: |
        python -m pip install bandit

    - name: Security scan
      run: |
        bandit -r src/ -f json -o security-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v7
      with:
        name: security-report
        path: security-report.json

  release-build:
    name: Release build (${{ matrix.os }})
    needs: [test, lint, build, security]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install PyInstaller
      run: |
        python -m pip install pyinstaller

    - name: Build executable
      run: |
        cd src
        pyinstaller --onefile --name samrat-${{ runner.os }} main.py
        pyinstaller --onefile --name samrat-cli-${{ runner.os }} cli.py

    - name: Upload release artifacts
      uses: actions/upload-artifact@v7
      with:
        name: release-${{ runner.os }}
        path: |
          src/dist/*
        if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [release-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7

    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets
        pattern: release-*
        merge-multiple: true

    - name: Create source archives
      run: |
        python - <<'PY'
        import pathlib
        import tarfile
        import zipfile

        root = pathlib.Path('.')
        exclude = {'.git', 'build', 'dist', 'release-assets', '__pycache__'}

        with tarfile.open('samrat-source.tar.gz', 'w:gz') as tar:
            for path in root.iterdir():
                if path.name in exclude:
                    continue
                tar.add(path, arcname=path.name)

        with zipfile.ZipFile('samrat-source.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
            for path in root.rglob('*'):
                if any(part in exclude for part in path.parts):
                    continue
                if path.is_file():
                    zf.write(path, arcname=str(path).replace('\\', '/'))
        PY

    - name: Generate checksums
      run: |
        cd release-assets
        sha256sum * > ../checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Samrat ${{ github.ref_name }}
        body_path: docs/CHANGELOG.md
        draft: false
        prerelease: false
        files: |
          release-assets/*
          samrat-source.tar.gz
          samrat-source.zip
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
